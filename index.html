    // ── APP ───────────────────────────────────────────────────
    function App() {
      return (
        <div style={{position:"relative",zIndex:1}}>
          <NMRBackground/>
          <ProgressBar/>
          <SideNav/>
          <Hero/>

          <main id="main-content">
            {/* MODULE 1 */}
            <Section id="sec-intro" bg="rgba(12,13,24,0.97)" ariaLabel="Module 1: Introduction to NMR">
              <Reveal><Label>Module 1: Introduction</Label><H>What is NMR Spectroscopy?</H></Reveal>
              <div className="two-col">
                <Reveal delay={.1}>
                  <P>Nuclear Magnetic Resonance (NMR) is an analytical spectroscopic technique that exploits the magnetic properties of certain atomic nuclei to determine the chemical structure and dynamics of molecules. It operates on the same physical principles as magnetic resonance imaging (MRI) in clinical medicine.</P>
                  <P>NMR uniquely provides: chemical shift (which functional groups are present), integral (how many protons), J-coupling (how groups are connected), and relaxation times T₁ and T₂ (molecular dynamics).</P>
                  <div style={{display:"flex",flexWrap:"wrap",marginTop:4}}>
                    <Chip color={C.blue}>Chemical analysis</Chip>
                    <Chip color={C.sky}>Protein structure</Chip>
                    <Chip color={C.seafoam}>MRI</Chip>
                    <Chip color={C.peri}>Materials science</Chip>
                    <Chip color={C.teal}>Drug discovery</Chip>
                  </div>
                </Reveal>
                <Reveal delay={.25}>
                  <div className="glass-2" style={{borderRadius:22,padding:24}}>
                    <p style={{fontSize:12,fontWeight:700,color:C.text2,marginBottom:16,textTransform:"uppercase",letterSpacing:".06em"}}>Prof. Patrick van der Wel · University of Groningen</p>
                    <div style={{borderRadius:14,overflow:"hidden",marginBottom:16,background:"rgba(6,6,14,0.8)",padding:"12px 0"}}>
                      <SpectrometerSVG/>
                    </div>
                    <p style={{fontSize:15,color:C.text2,lineHeight:1.65,textAlign:"center"}}>Superconducting magnet, liquid helium cooling, Bruker Ascend platform</p>
                    <Callout color={C.blue}><strong>Recommended reading:</strong> Kwan et al., FEBS J. 2011 — "Macromolecular NMR spectroscopy for the non-spectroscopist."</Callout>
                  </div>
                </Reveal>
              </div>
              <Reveal delay={.2}><VideoEmbed id="RZLew6Ff-JE" title="NMR Spectroscopy Visualized" caption="NMR Spectroscopy Visualized: overview of how NMR works (approx. 10 min)"/></Reveal>
            </Section>

            {/* MODULE 2 */}
            <Section id="sec-spin" bg="rgba(16,18,32,0.97)" ariaLabel="Module 2: Nuclear spin">
              <Reveal><Label>Module 2: Nuclear Spin</Label><H>Nuclei as Miniature Magnets</H></Reveal>
              <div className="two-col">
                <Reveal delay={.1}>
                  <P>Certain atomic nuclei possess a quantum mechanical property called <strong>spin</strong>, characterised by spin quantum number I. Nuclei with I ≠ 0 have a <strong>magnetic moment</strong> and are NMR-active.</P>
                  <Fml>μ = γ · I</Fml>
                  <P>The magnetic moment <strong>μ</strong> is proportional to angular momentum <strong>I</strong> through the <strong>gyromagnetic ratio γ</strong>, a nucleus-specific constant. A larger γ gives stronger NMR signals.</P>
                  <P>For spin-½ nuclei: α state (m=+½, parallel to B₀, lower energy) and β state (m=−½, antiparallel, higher energy).</P>
                </Reveal>
                <Reveal delay={.25}>
                  <div style={{display:"flex",gap:24,justifyContent:"center",flexWrap:"wrap"}}>
                    <div style={{textAlign:"center"}}>
                      <Nucleus spinUp={true} color={C.blue}/>
                      <p style={{fontSize:14,color:C.text2,marginTop:6}}>α-state (lower energy)</p>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <Nucleus spinUp={false} color={C.sky}/>
                      <p style={{fontSize:14,color:C.text2,marginTop:6}}>β-state (higher energy)</p>
                    </div>
                  </div>
                </Reveal>
              </div>
              <Reveal delay={.2}>
                <div style={{marginTop:40}}>
                  <p style={{fontWeight:600,fontSize:17,color:C.text,marginBottom:16,fontFamily:"'Cormorant Garamond',serif"}}>Gyromagnetic ratios of NMR-relevant nuclei (IUPAC 2021):</p>
                  <GTable/>
                </div>
              </Reveal>
            </Section>

            {/* MODULE 3 */}
            <Section id="sec-energy" bg="rgba(5,6,14,0.99)" ariaLabel="Module 3: Energy levels and Larmor frequency">
              <Reveal><Label>Module 3: Energy Levels</Label><H>Zeeman Splitting and Resonance</H></Reveal>
              <div className="two-col">
                <Reveal delay={.1}>
                  <P>In an external magnetic field B₀, each spin state acquires a distinct energy (Zeeman effect):</P>
                  <div className="glass" style={{borderRadius:12,padding:"13px 20px",margin:"10px 0 18px"}}>
                    <p className="serif" style={{fontStyle:"italic",fontSize:18,color:"#c0d8ff",margin:"0 0 7px"}}>E = −γ m ℏ B₀</p>
                    <p style={{fontSize:15,color:C.text2,margin:0}}>m = +½ (α): lower energy. m = −½ (β): higher energy (for γ {">"} 0).</p>
                  </div>
                  <P>The energy difference and the Larmor frequency:</P>
                  <div className="glass" style={{borderRadius:12,padding:"13px 20px",margin:"10px 0 18px",border:`1px solid ${C.seafoam}30`}}>
                    <p className="serif" style={{fontStyle:"italic",fontSize:20,color:C.seafoam,margin:"0 0 6px"}}>ΔE = γ ℏ B₀</p>
                    <p className="serif" style={{fontStyle:"italic",fontSize:20,color:C.blue,margin:0}}>ν₀ = γ B₀ / 2π</p>
                  </div>
                  <P>The Boltzmann distribution determines the α/β spin population ratio. At 14.1 T and 300 K the excess of α spins is only ~96 ppm per spin. Higher B₀ improves sensitivity approximately as B₀^(7/4).</P>
                </Reveal>
                <Reveal delay={.25}><EnergyDiag/></Reveal>
              </div>
              <Reveal delay={.2}><div style={{marginTop:44}}><BoltzCalc/></div></Reveal>
              <Reveal delay={.3}><CheckpointQuiz questions={CHECKPOINT_M3} moduleLabel="Energy Levels"/></Reveal>
            </Section>

            {/* MODULE 4 */}
            <Section id="sec-process" bg="rgba(12,13,24,0.97)" ariaLabel="Module 4: The NMR experiment">
              <Reveal>
                <Label>Module 4: The NMR Experiment</Label>
                <H>From Spins to Spectrum</H>
                <P size={17}>An NMR experiment proceeds through five sequential steps. Click each step to view the animation and explanation.</P>
              </Reveal>
              <Reveal delay={.1}><ProcessSec/></Reveal>
              <Reveal delay={.15}><VideoEmbed id="fG-ZexdlziU" title="NMR Spectroscopy for Visual Learners" caption="NMR for Visual Learners: chemical shift, coupling, and spectrum interpretation (approx. 12 min)"/></Reveal>
            </Section>

            {/* MODULE 5 */}
            <Section id="sec-shift" bg="rgba(16,18,32,0.97)" ariaLabel="Module 5: Chemical shift">
              <Reveal><Label>Module 5: Chemical Shift</Label><H>Electrons as a Magnetic Shield</H></Reveal>
              <div className="two-col">
                <Reveal delay={.1}>
                  <P>B₀ induces a circulation of electrons around each nucleus, generating a small opposing field. This <strong>chemical shielding</strong> (σ) reduces the effective field:</P>
                  <Fml>B<sub style={{fontSize:".75em",fontStyle:"normal"}}>eff</sub> = B₀ (1 − σ)</Fml>
                  <P>Chemical shift δ in ppm is field-independent (IUPAC convention):</P>
                  <Fml>δ = (ν − ν<sub style={{fontSize:".75em",fontStyle:"normal"}}>ref</sub>) / ν<sub style={{fontSize:".75em",fontStyle:"normal"}}>ref</sub> × 10⁶</Fml>
                  <Callout color={C.teal} bg={C.tealSoft}><strong>Why ppm?</strong> Expressing differences relative to the operating frequency removes the B₀ dependence, making spectra from different spectrometers directly comparable.</Callout>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:14}}>
                    <div className="glass-2" style={{flex:"1 1 150px",borderRadius:12,padding:"14px 15px",borderLeft:`3px solid ${C.blue}`}}>
                      <p style={{fontWeight:700,color:C.blue,margin:"0 0 5px",fontSize:15}}>Upfield (low δ)</p>
                      <p style={{fontSize:15,color:C.text2,margin:0}}>High electron density, strong shielding. Example: CH₃ at ~1 ppm.</p>
                    </div>
                    <div className="glass-2" style={{flex:"1 1 150px",borderRadius:12,padding:"14px 15px",borderLeft:`3px solid ${C.coral}`}}>
                      <p style={{fontWeight:700,color:C.coral,margin:"0 0 5px",fontSize:15}}>Downfield (high δ)</p>
                      <p style={{fontSize:15,color:C.text2,margin:0}}>Low electron density, weak shielding. Example: COOH at ~12 ppm.</p>
                    </div>
                  </div>
                </Reveal>
                <Reveal delay={.25}>
                  <div className="glass-2" style={{borderRadius:20,padding:22}}>
                    <p className="serif" style={{fontWeight:700,fontSize:16,color:C.text,marginBottom:14}}>Typical ¹H Chemical Shift Ranges</p>
                    {[{l:"RCOOH (carboxylic acid)",r:"10–12",c:C.coral},{l:"RCHO (aldehyde)",r:"9–10",c:C.blue},{l:"ArH (aromatic)",r:"6.5–8",c:C.sky},{l:"R₂C=CH₂ (vinyl)",r:"4.5–6.5",c:C.peri},{l:"RCH₂OR (ether)",r:"3.3–4",c:C.seafoam},{l:"RCH₃ (methyl)",r:"0.9–1.2",c:C.teal},{l:"TMS (reference)",r:"0",c:C.text3}].map(r=>(
                      <div key={r.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`,flexWrap:"wrap",gap:4}}>
                        <span style={{fontSize:15,color:C.text}}>{r.l}</span>
                        <span className="serif" style={{fontSize:14,fontWeight:700,color:r.c,fontStyle:"italic"}}>{r.r} ppm</span>
                      </div>
                    ))}
                  </div>
                </Reveal>
              </div>
              <Reveal delay={.3}><CheckpointQuiz questions={CHECKPOINT_M5} moduleLabel="Chemical Shift"/></Reveal>
            </Section>

            {/* MODULE 6 */}
            <Section id="sec-spectrum" bg="rgba(12,13,24,0.97)" ariaLabel="Module 6: Reading the NMR spectrum">
              <Reveal><Label>Module 6: Reading the NMR Spectrum</Label><H>Interpreting Peaks</H><P size={17}>Each peak corresponds to nuclei in a specific chemical environment. Click or hover over peaks to explore their assignment.</P></Reveal>
              <Reveal delay={.1}><IntSpectrum/></Reveal>
              <Reveal delay={.2}>
                <div className="grid-auto" style={{marginTop:36}}>
                  <InfoCard icon={Ic.Locate} title="Chemical shift (δ)" text="The position in ppm identifies the electronic environment. Each functional group has a characteristic shift range." accent={C.blue}/>
                  <InfoCard icon={Ic.Ruler} title="Integral" text="The area under each peak is proportional to the number of nuclei in that environment, enabling proton counting." accent={C.seafoam}/>
                  <InfoCard icon={Ic.GitBranch} title="Multiplicity" text="Peaks split by J-coupling according to the n+1 rule. Singlet: no neighbours. Doublet: one. Triplet: two." accent={C.sky}/>
                  <InfoCard icon={Ic.Resize} title="Linewidth" text="T₂ relaxation governs linewidth. Short T₂ (solids, large proteins) gives broad peaks; long T₂ (small molecules) gives narrow peaks." accent={C.peri}/>
                </div>
              </Reveal>
              <Reveal delay={.25}>
                <div className="glass-2" style={{borderRadius:18,padding:"20px 22px",marginTop:32}}>
                  <p className="serif" style={{fontWeight:700,fontSize:15,color:C.gold,marginBottom:4,textTransform:"uppercase",letterSpacing:".08em"}}>Case study: ¹H NMR of Ethanol</p>
                  <p style={{fontSize:15,color:C.text2,marginBottom:14}}>CH₃CH₂OH — three chemically distinct proton environments</p>
                  <EthanolSpectrumSVG/>
                  <p style={{fontSize:13,color:C.text3,marginTop:8,textAlign:"center",fontStyle:"italic"}}>¹H NMR: CH₂ quartet (δ 3.7, J=7 Hz), OH singlet (δ 2.6), CH₃ triplet (δ 1.2, J=7 Hz)</p>
                </div>
              </Reveal>
              <Reveal delay={.3}><CheckpointQuiz questions={CHECKPOINT_M6} moduleLabel="Reading Spectra"/></Reveal>
            </Section>

            {/* MODULE 7 */}
            <Section id="sec-jsplit" bg="rgba(16,18,32,0.97)" ariaLabel="Module 7: J-coupling and the Karplus equation">
              <Reveal><Label>Module 7: J-Coupling and the Karplus Equation</Label><H>Nuclei Communicating through Bonds</H></Reveal>
              <div className="two-col">
                <Reveal delay={.1}>
                  <P><strong>Scalar coupling</strong> (J-coupling) arises when adjacent nuclei sense each other's spin state through electrons in intervening bonds, causing peaks to split into multiplets.</P>
                  <P>The <strong>n+1 rule</strong>: a proton adjacent to n equivalent neighbouring protons produces n+1 lines with Pascal's triangle intensities. The coupling constant J (Hz) is field-independent.</P>
                  <Callout color={C.blue}><strong>Ethanol ¹H NMR:</strong> The CH₂ group (adjacent to 3 CH₃ protons) appears as a quartet (1:3:3:1). The CH₃ group (adjacent to 2 CH₂ protons) appears as a triplet (1:2:1). Equal J values (~7 Hz) confirm mutual coupling.</Callout>
                  <Callout color={C.sky} bg={C.skySoft}><strong>Karplus equation:</strong> ³J<sub style={{fontSize:".75em"}}>HH</sub> = Acos²θ − Bcosθ + C. The magnitude of the coupling constant depends on the dihedral angle θ. This connects J values to molecular geometry and protein secondary structure.</Callout>
                </Reveal>
                <Reveal delay={.25}><JSplitViz/></Reveal>
              </div>
              <Reveal delay={.2}><div style={{marginTop:38}}><KarplusCurve/></div></Reveal>
              <Reveal delay={.3}><CheckpointQuiz questions={CHECKPOINT_M7} moduleLabel="J-Coupling & Karplus"/></Reveal>
            </Section>

            {/* MODULE 8 */}
            <Section id="sec-2d" bg="rgba(12,13,24,0.97)" ariaLabel="Module 8: Two-dimensional NMR">
              <Reveal><Label>Module 8: Two-Dimensional NMR</Label><H>Two Dimensions, More Information</H></Reveal>
              <div className="two-col">
                <Reveal delay={.1}>
                  <P>In one-dimensional spectra of large molecules, hundreds of peaks overlap. Introducing a <strong>second frequency dimension</strong> spreads resonances and encodes connectivity information.</P>
                  <Callout color={C.blue}><strong>COSY:</strong> ¹H–¹H connectivity through 2–3 covalent bonds. Used to map the carbon skeleton.</Callout>
                  <Callout color={C.peri}><strong>NOESY:</strong> ¹H–¹H proximity in 3D space (less than 5 Å). NOE intensity ∝ r⁻⁶, making NOESY the primary source of distance restraints for protein structure determination.</Callout>
                  <Callout color={C.seafoam}><strong>HSQC:</strong> One-bond ¹H–¹³C correlation. Each cross-peak represents a CH bond, providing a complete molecular fingerprint.</Callout>
                  <P size={15}>For proteins above ~10 kDa, 3D and 4D experiments (HNCA, HNCACB, NOESY-HSQC) combined with ¹³C/¹⁵N isotope labelling are required for full resonance assignment.</P>
                  <div className="glass" style={{borderRadius:14,padding:"16px 12px",marginTop:8}}>
                    <ProteinSVG/>
                    <p style={{fontSize:13,color:C.text3,textAlign:"center",margin:"6px 0 0",fontStyle:"italic"}}>Protein secondary structure elements determined via NMR distance restraints</p>
                  </div>
                </Reveal>
                <Reveal delay={.25}>
                  <p style={{fontSize:15,color:C.text2,marginBottom:12,textAlign:"center"}}>Select an experiment to view the cross-peak pattern.</p>
                  <TwoDNMR/>
                </Reveal>
              </div>
              <Reveal delay={.3}><CheckpointQuiz questions={CHECKPOINT_M8} moduleLabel="2D NMR"/></Reveal>
            </Section>

            {/* MODULE 9 */}
            <Section id="sec-solid" bg="rgba(16,18,32,0.97)" ariaLabel="Module 9: Solid-state NMR">
              <Reveal><Label>Module 9: Solid-State NMR</Label><H>When Solution NMR Is Not Applicable</H></Reveal>
              <div className="two-col">
                <Reveal delay={.1}>
                  <P>Solution NMR requires rapid, isotropic molecular tumbling to average anisotropic interactions to zero. Many important systems cannot be dissolved: membrane proteins, amyloid fibrils, inorganic catalysts, and polymers.</P>
                  <P>In the solid state, molecules are fixed in position. Each crystallite orientation resonates at a slightly different frequency, producing a broad <strong>powder pattern</strong> spanning tens of kilohertz.</P>
                  <Callout color={C.blue}><strong>Magic Angle Spinning (MAS):</strong> The sample is rotated at 10,000–100,000 rpm around an axis inclined at 54.74° to B₀ (where 3cos²θ − 1 = 0). This mechanical averaging eliminates dipolar couplings and CSA, restoring solution-like linewidths.</Callout>
                  <Callout color={C.teal} bg={C.tealSoft}><strong>Key applications:</strong> amyloid fibrils (Huntington's, Parkinson's disease), membrane proteins, inorganic catalysts, pharmaceutical polymorphs, hydrogels, and polymer materials.</Callout>
                  <div className="glass" style={{borderRadius:14,padding:"14px 12px",marginTop:8}}>
                    <p style={{fontSize:12,fontWeight:700,color:C.text2,textTransform:"uppercase",letterSpacing:".07em",margin:"0 0 10px",textAlign:"center"}}>Powder pattern vs MAS</p>
                    <PowderPatternSVG/>
                    <p style={{fontSize:12,color:C.text3,textAlign:"center",margin:"6px 0 0",fontStyle:"italic"}}>MAS at 54.74° converts broad powder patterns into resolved peaks</p>
                  </div>
                </Reveal>
                <Reveal delay={.25}><MASAnim/></Reveal>
              </div>
            </Section>

            {/* MODULE 10 */}
            <Section id="sec-app" bg="rgba(5,6,14,0.99)" ariaLabel="Module 10: Applications of NMR">
              <Reveal><Label>Module 10: Applications</Label><H>NMR in Practice</H></Reveal>
              <div className="grid-auto-sm" style={{marginTop:16}}>
                {[
                  {icon:Ic.HeartPulse,t:"MRI",d:"Magnetic resonance imaging applies ¹H NMR of tissue water to generate 3D anatomical images without ionising radiation. Contrast arises from spatial variations in T₁ and T₂.",c:C.blue},
                  {icon:Ic.Pill,t:"Drug discovery",d:"NMR reveals how drug candidates bind to protein targets, enabling structure-activity relationship analysis. Fragment-based drug design relies on NMR screening.",c:C.sky},
                  {icon:Ic.Dna,t:"Protein structure",d:"Solution NMR determines 3D protein structures up to ~50 kDa. Solid-state NMR extends this to amyloid fibrils, membrane proteins, and large assemblies.",c:C.teal},
                  {icon:Ic.Beaker,t:"Food & quality control",d:"Low-field NMR measures water and fat content non-destructively. Metabolomics (¹H NMR of urine/blood) provides metabolic profiles for biomarker discovery.",c:C.seafoam},
                  {icon:Ic.FlaskConical,t:"Chemical synthesis",d:"NMR confirms the structure of synthetic products, assesses purity, and determines stereochemistry including R/S configuration and cis/trans isomerism.",c:C.peri},
                  {icon:Ic.Cpu,t:"Materials science",d:"Solid-state NMR characterises polymers, zeolite catalysts, hydrogels, and inorganic materials. ²⁹Si NMR for silicates; ³¹P NMR for phosphate-based materials.",c:C.seafoam},
                ].map(item=>(
                  <Reveal key={item.t}>
                    <div className="card-hover glass" style={{borderRadius:18,padding:"22px 20px",border:`1px solid ${item.c}25`,borderTop:`2px solid ${item.c}60`}}>
                      <div style={{color:item.c,marginBottom:12,display:'flex'}}><item.icon/></div>
                      <p className="serif" style={{fontWeight:700,fontSize:16,color:item.c,margin:"0 0 8px"}}>{item.t}</p>
                      <p style={{fontSize:15,color:C.text2,lineHeight:1.65,margin:0}}>{item.d}</p>
                    </div>
                  </Reveal>
                ))}
              </div>
              <Reveal delay={.2}>
                <div className="glass" style={{borderRadius:18,overflow:"hidden",marginTop:32,display:"flex",gap:0,flexWrap:"wrap"}}>
                  <div style={{flex:"1 1 260px",background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
                    <MRIBrainSVG/>
                  </div>
                  <div style={{flex:"1 1 240px",padding:"24px 24px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                      <span style={{color:C.blue}}><Ic.HeartPulse/></span>
                      <p className="serif" style={{fontWeight:700,fontSize:17,color:C.blue,margin:0}}>MRI — NMR in the clinic</p>
                    </div>
                    <p style={{fontSize:15,color:C.text2,lineHeight:1.72,margin:0}}>Magnetic Resonance Imaging maps the ¹H signal of water molecules in tissue. Spatial encoding via gradient fields allows 3D image reconstruction. Contrast between tissue types arises from differences in T₁ and T₂ relaxation times.</p>
                  </div>
                </div>
              </Reveal>
              <Reveal delay={.25}><VideoEmbed id="OZjpaDMSXVM" title="MRI Scan Animation" caption="MRI Scan Animation: step-by-step visual explanation (approx. 6 min)"/></Reveal>
            </Section>

            {/* MODULE 11: FINAL QUIZ */}
            <Section id="sec-quiz" bg="rgba(16,18,32,0.97)" ariaLabel="Module 11: Knowledge assessment quiz">
              <Reveal>
                <Label>Module 11: Knowledge Assessment</Label>
                <H>Test Your Understanding</H>
                <P size={17}>Five conceptual questions covering solid-state NMR, relaxation, ¹³C spectroscopy, 2D methods, and protein structure determination.</P>
              </Reveal>
              <Reveal delay={.1}><div style={{maxWidth:700}}><QuizSection/></div></Reveal>
            </Section>

            {/* SUMMARY */}
            <Section id="sec-summary" bg="rgba(5,6,14,0.99)" ariaLabel="Summary of NMR core concepts">
              <Reveal><Label>Summary</Label><H>Core Concepts of NMR</H></Reveal>
              <div className="grid-auto-sm">
                {[
                  {icon:Ic.Atom,t:"Nuclear spin",d:"Nuclei with I ≠ 0 are NMR-active. μ = γI. ¹H has the largest γ (26.75 × 10⁷ rad/T/s) and therefore the greatest sensitivity.",c:C.blue},
                  {icon:Ic.Zap,t:"Larmor frequency",d:"ΔE = γℏB₀. ν₀ = γB₀/2π. Boltzmann excess is ~96 ppm at 14.1 T and 300 K, making sensitivity a fundamental challenge.",c:C.sky},
                  {icon:Ic.FlaskConical,t:"Chemical shift",d:"B_eff = B₀(1 − σ). Chemical shift δ in ppm is field-independent and reports on the electronic environment of each nucleus.",c:C.seafoam},
                  {icon:Ic.Link2,t:"J-coupling",d:"n+1 rule governs multiplet patterns. The Karplus equation connects ³J coupling constants to dihedral angles and molecular conformation.",c:C.teal},
                  {icon:Ic.Map,t:"2D NMR",d:"COSY (H-H through bonds), NOESY (H-H in space, NOE ∝ r⁻⁶), and HSQC (H-C one bond) form the basis for protein structure determination.",c:C.peri},
                  {icon:Ic.Database,t:"Solid-state NMR",d:"MAS at 54.74° averages dipolar couplings and CSA to zero, restoring sharp linewidths for solid samples that cannot be dissolved.",c:C.seafoam},
                ].map(item=>(
                  <Reveal key={item.t}>
                    <div className="glass" style={{borderRadius:15,padding:"20px 18px",border:`1px solid ${item.c}25`,borderLeft:`2px solid ${item.c}60`}}>
                      <div style={{color:item.c,marginBottom:10,display:'flex'}}><item.icon/></div>
                      <p className="serif" style={{fontWeight:700,fontSize:15,color:item.c,margin:"0 0 7px"}}>{item.t}</p>
                      <p style={{fontSize:15,color:C.text2,lineHeight:1.65,margin:0}}>{item.d}</p>
                    </div>
                  </Reveal>
                ))}
              </div>
              <Reveal delay={.3}>
                <div style={{marginTop:64,paddingBottom:16}}>
                  <div style={{borderTop:`1px solid rgba(201,169,110,0.2)`,paddingTop:44,display:"flex",gap:40,flexWrap:"wrap",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <p style={{fontSize:12,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"rgba(201,169,110,0.5)",margin:"0 0 16px"}}>Authors</p>
                      <div style={{display:"flex",gap:32,flexWrap:"wrap"}}>
                        {[{name:"Sem Andriessen",num:"S5842212"},{name:"Niels van der Heide",num:"S5989515"},{name:"Tim Krol",num:"S5973058"},{name:"Gosse Zandstra",num:"S5465508"}].map(s=>(
                          <div key={s.num}>
                            <p style={{color:"#f0f0f8",fontSize:15,fontWeight:600,margin:"0 0 2px"}}>{s.name}</p>
                            <p style={{color:"rgba(90,90,122,0.7)",fontSize:13,margin:0}}>{s.num}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <p style={{fontSize:12,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"rgba(201,169,110,0.5)",margin:"0 0 10px"}}>Course material</p>
                      <p style={{color:C.text2,fontSize:14,lineHeight:1.7,margin:0}}>Patrick van der Wel.<br/>Surface Characterization (BME BSc): NMR Spectroscopy.<br/>University of Groningen, 2024–2025.</p>
                    </div>
                  </div>
                </div>
              </Reveal>
            </Section>
          </main>
          <References/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
