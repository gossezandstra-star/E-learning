<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NMR Spectroscopy · BME BSc · University of Groningen</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #06060e; color: #dde2f2; -webkit-text-size-adjust: 100%; line-height: 1.6; }
    button { font-family: inherit; cursor: pointer; }
    img { max-width: 100%; }

    /* ── DESIGN TOKENS (8pt rhythm) ───────────────────────── */
    :root {
      /* Spacing – 8pt grid */
      --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;
      --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;  --sp-10: 40px;
      --sp-12: 48px; --sp-16: 64px; --sp-20: 80px;

      /* Typography scale */
      --text-xs: 12px; --text-sm: 14px; --text-base: 16px;
      --text-lg: 18px; --text-xl: 20px; --text-2xl: 24px;
      --text-3xl: 30px; --text-4xl: 36px; --text-5xl: 48px;

      /* Colour tokens */
      --clr-bg:       #06060e;
      --clr-bg-alt:   #0d0d1a;
      --clr-bg-dark:  #020209;
      --clr-surface:  rgba(255,255,255,0.05);
      --clr-surface-2:rgba(255,255,255,0.09);
      --clr-text:     #dde2f2;
      --clr-text-2:   #7e8aaa;
      --clr-text-3:   #4a5270;
      --clr-blue:     #4AA8FF;
      --clr-teal:     #00BFA8;
      --clr-sky:      #2EC4E0;
      --clr-peri:     #7A9FFF;
      --clr-seafoam:  #00D4A4;
      --clr-gold:     #C9A96E;
      --clr-coral:    #FF7C6E; /* error-only */
      --clr-border:   rgba(255,255,255,0.09);
      --clr-border-gold: rgba(201,169,110,0.28);

      /* Radius */
      --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 24px;

      /* Shadows */
      --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,.4);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.5);

      /* Animation (150-300ms, skill rule) */
      --dur-fast: 150ms;
      --dur-base: 250ms;
      --dur-slow: 350ms;
      --ease-out: cubic-bezier(0.16,1,0.3,1);
      --ease-in:  cubic-bezier(0.7,0,0.84,0);

      /* Touch target */
      --touch: 48px;
    }

    /* ── ACCESSIBILITY ────────────────────────────────────── */
    /* Focus ring — skill rule: 2-4px visible focus */
    :focus-visible {
      outline: 2px solid var(--clr-blue);
      outline-offset: 3px;
      border-radius: 4px;
    }

    /* Skip link */
    .skip-link {
      position: fixed; top: var(--sp-4); left: var(--sp-4);
      background: var(--clr-blue); color: #06060e;
      padding: var(--sp-2) var(--sp-4); border-radius: var(--r-sm);
      font-weight: 600; font-size: var(--text-sm); z-index: 10000;
      transform: translateY(-120%); transition: transform var(--dur-fast);
      text-decoration: none;
    }
    .skip-link:focus { transform: translateY(0); }

    /* prefers-reduced-motion — skill rule */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── SCROLLBAR ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--clr-bg-alt); }
    ::-webkit-scrollbar-thumb { background: var(--clr-gold); border-radius: 2px; }

    /* ── LAYOUT ───────────────────────────────────────────── */
    .section { padding: var(--sp-20) 6% var(--sp-20); position: relative; overflow: hidden; }
    .max-w   { max-width: 1100px; margin: 0 auto; }
    .two-col { display: flex; gap: var(--sp-12); align-items: flex-start; flex-wrap: wrap; }
    .two-col > * { flex: 1 1 280px; }
    .grid-2  { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
    .grid-3  { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--sp-3); }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fit,minmax(190px,1fr)); gap: var(--sp-4); }
    .grid-auto-sm { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: var(--sp-3); }
    .overflow-x { overflow-x: auto; }

    @media (max-width:700px) {
      .section { padding: var(--sp-16) 5% var(--sp-16); }
      .two-col { flex-direction:column; gap: var(--sp-8); }
      .grid-2  { grid-template-columns: 1fr; }
      .grid-3  { grid-template-columns: 1fr; }
      .hide-sm { display: none !important; }
      .side-nav{ display: none !important; }
    }
    @media (max-width:480px) {
      .section { padding: var(--sp-12) var(--sp-4) var(--sp-12); }
    }

    /* ── GLASS ────────────────────────────────────────────── */
    .glass {
      background: var(--clr-surface);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--clr-border);
    }
    .glass-2 {
      background: var(--clr-surface-2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.14);
    }

    /* ── CARD HOVER (skill: ease-out 250ms) ──────────────── */
    .card-hover { transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

    /* ── TYPOGRAPHY ───────────────────────────────────────── */
    .serif { font-family: 'Cormorant Garamond', Georgia, serif; }
    .gold-text {
      background: linear-gradient(110deg, #C9A96E 0%, #f5dfa0 40%, #C9A96E 70%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    /* ── ANIMATIONS ───────────────────────────────────────── */
    @keyframes shimmer { from{background-position:-200% center} to{background-position:200% center} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    @keyframes pulse   { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }
    @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .fade-up { animation: fadeUp var(--dur-slow) var(--ease-out); }

    /* ── SIDE NAV ─────────────────────────────────────────── */
    .side-nav {
      position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
      z-index: 5000; display: flex; flex-direction: column; gap: 10px; align-items: center;
    }
    .side-nav-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: none;
      transition: all var(--dur-base) var(--ease-out); position: relative;
      /* Touch target extended via padding */
      padding: 8px; margin: -8px;
      background-clip: content-box;
    }
    .side-nav-dot::before {
      content: '';
      position: absolute; inset: 8px;
      border-radius: 50%; background: rgba(255,255,255,0.2);
      transition: all var(--dur-base) var(--ease-out);
    }
    .side-nav-dot:hover::before { background: rgba(201,169,110,0.6); transform: scale(1.4); }
    .side-nav-dot.active::before { background: var(--clr-gold); box-shadow: 0 0 12px var(--clr-gold); }
    .side-nav-dot .tooltip {
      position: absolute; right: 22px; top: 50%; transform: translateY(-50%);
      background: rgba(12,12,22,0.92); border: 1px solid var(--clr-border-gold);
      color: var(--clr-gold); font-size: var(--text-xs); font-weight: 600;
      letter-spacing: 0.04em; padding: 5px 10px; border-radius: 6px;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity var(--dur-fast);
    }
    .side-nav-dot:hover .tooltip { opacity: 1; }

    /* ── PROGRESS BAR ─────────────────────────────────────── */
    .progress-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 3px;
      z-index: 9000; pointer-events: none;
    }
    .progress-bar-fill {
      height: 100%; transition: width 0.1s linear;
      background: linear-gradient(90deg, var(--clr-gold), #f5dfa0, var(--clr-blue));
      box-shadow: 0 0 12px rgba(201,169,110,0.7);
    }

    /* ── CHECKPOINT QUIZ ──────────────────────────────────── */
    .checkpoint-wrap {
      margin-top: var(--sp-10);
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: var(--r-lg); padding: var(--sp-8) var(--sp-6);
      background: rgba(201,169,110,0.05); backdrop-filter: blur(12px);
    }

    /* ── SECTION DIVIDER ──────────────────────────────────── */
    .section + .section::before {
      content: ''; position: absolute; top: 0; left: 6%; right: 6%; height: 1px;
      background: linear-gradient(90deg,transparent,rgba(201,169,110,0.2),transparent);
    }

    /* ── VIDEO EMBED ──────────────────────────────────────── */
    .video-wrap { border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow-lg); border: 1px solid var(--clr-border); position: relative; }
    .video-thumb { cursor: pointer; position: relative; padding-top: 56.25%; background: #000; }
    .video-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .video-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 72px; height: 72px; border-radius: 50%; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--dur-base), transform var(--dur-base) var(--ease-out);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .video-thumb:hover .video-play { background: #c00; transform: translate(-50%,-50%) scale(1.08); }
    .video-thumb:focus-visible .video-play { outline: 2px solid var(--clr-blue); outline-offset: 4px; }

    /* ── INPUT RANGE ──────────────────────────────────────── */
    input[type=range] { height: 4px; border-radius: 2px; width: 100%; }
  </style>
</head>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    const C = {

      Locate:    ()=><Icon d={["M12 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16","M12 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4","M12 2v2","M12 20v2","M2 12h2","M20 12h2"]}/>,

    const NAV_SECTIONS = [
      {id:"hero",       label:"Start"},

    // ── QUIZ DATA ─────────────────────────────────────────────
    const QUIZ_ALL=[
      {q:"Calculate the Larmor frequency of ¹³C at B₀ = 14.1 T. γ(¹³C) = 6.728 × 10⁷ rad T⁻¹ s⁻¹.",
       opts:["600 MHz","150.9 MHz","243 MHz","60.8 MHz"],ans:1,
       exp:"ν₀ = γB₀/2π = 6.728×10⁷ × 14.1 / 6.283 ≈ 150.9 MHz. The ratio of ¹³C to ¹H Larmor frequencies equals the ratio of their gyromagnetic ratios at constant B₀."},
      {q:"Why is NMR relatively insensitive compared to other spectroscopic methods?",

       exp:"The Boltzmann excess Nα−Nβ / Ntotal ≈ γℏB₀/2kT. At 14.1 T and 300 K for ¹H: excess ≈ 96 ppm. Only this tiny fraction contributes to the net magnetisation and NMR signal."},

       exp:"Quartet at 4.1 ppm: CH₂ adjacent to 3 CH₃ protons (n+1=4). Triplet at 1.3 ppm: CH₃ adjacent to 2 CH₂ protons (n+1=3). Equal J values confirm mutual coupling. Pattern and integrals match ethanol."},
      {q:"What information does a COSY spectrum provide?",
       opts:["One-bond ¹H–¹³C correlations","Proton-proton scalar coupling correlations through bonds, revealing which protons are neighbours","Spatial proximity regardless of bond count","Chemical shifts of aromatic protons only"],ans:1,
       exp:"COSY (COrrelation SpectroscopY) produces off-diagonal cross-peaks for ¹H nuclei that are J-coupled through 2 or 3 bonds. This reveals connectivity along the carbon skeleton and is essential for resonance assignment."},
      {q:"What is the correct relationship between T₁ and T₂?",
       opts:["T₁ describes transverse decay; T₂ describes longitudinal recovery","T₁ is longitudinal (spin-lattice) recovery; T₂ is transverse (spin-spin) dephasing. Always T₂ ≤ T₁","T₁ and T₂ are always equal","T₂ is always larger than T₁"],ans:1,
       exp:"T₁ (spin-lattice) is the time constant for recovery of longitudinal magnetisation Mz. T₂ (spin-spin) is the time constant for loss of transverse phase coherence. The inequality T₂ ≤ T₁ always holds."},
      {q:"Why are solid-state NMR peaks much broader than solution-state peaks?",
       opts:["The magnet is less homogeneous for solids","Dipolar couplings and CSA are not averaged by molecular tumbling, giving orientation-dependent frequencies","Solids inherently contain more chemical species","RF pulses are shorter for solids"],ans:1,
       exp:"In solution, rapid isotropic tumbling averages dipolar coupling (∝ 3cos²θ−1) and CSA to zero. In solids each crystallite orientation resonates at a different frequency, giving a broad powder pattern. MAS at 54.74° restores averaging."},
      {q:"The Karplus equation relates ³J_HH to dihedral angle θ. At which value(s) of θ is ³J maximised?",
       opts:["At θ = 90°","At θ = 0° and θ = 180°","At θ = 45° and θ = 135°","³J is independent of θ"],ans:1,
       exp:"The Karplus equation ³J = Acos²θ − Bcosθ + C has maxima at θ = 0° and θ = 180° where cos²θ = 1. At θ = 90° ³J reaches its minimum. Alpha-helices (φ≈−60°) give small J; beta-sheets (φ≈−120°) give large J."},
      {q:"How many ¹³C NMR peaks are expected for ethanol (CH₃CH₂OH)?",
       opts:["1","2","3","6"],ans:1,
       exp:"Ethanol contains two chemically inequivalent carbons: methyl (CH₃, ~δ 18 ppm) and methylene (CH₂, ~δ 58 ppm). Each inequivalent carbon gives one ¹³C peak. CH₂ is downfield due to deshielding by oxygen."},
      {q:"What does an HSQC experiment measure?",
       opts:["¹H–¹H couplings over three bonds","Direct one-bond ¹H–¹³C correlations, identifying all CH, CH₂, and CH₃ groups","Spatial proximity of protons in 3D space","Multi-bond ¹⁵N–¹H correlations"],ans:1,
       exp:"Heteronuclear Single Quantum Coherence (HSQC) produces a cross-peak for every proton directly bonded to ¹³C via a one-bond coupling. Each cross-peak has coordinates (δH, δC), providing a complete fingerprint of all CH groups."},
      {q:"What is the principal advantage of 2D NMR over 1D experiments?",
       opts:["2D experiments are faster","Spreading resonances across two frequency axes reduces overlap and encodes connectivity unavailable in 1D","2D has higher signal-to-noise ratio","2D works for NMR-inactive nuclei"],ans:1,
       exp:"In 1D spectra of large molecules, hundreds of peaks overlap in a limited window. A second frequency dimension spreads peaks and encodes connectivity (COSY: bonds; NOESY: space; HSQC: one-bond heteronuclear). This cannot be obtained from 1D data alone."},
      {q:"Which combination of NMR methods is primarily used to determine 3D protein structures in solution?",
       opts:["One-dimensional ¹H NMR alone","Multi-dimensional NMR (COSY, NOESY, HSQC, HNCA) with ¹³C/¹⁵N isotope labelling","Low-field benchtop NMR","Solid-state MAS NMR exclusively"],ans:1,
       exp:"For proteins above ~10 kDa, uniform ¹³C/¹⁵N labelling enables 3D/4D experiments (HNCA, HNCACB, NOESY-HSQC). NOESY distance restraints (NOE ∝ r⁻⁶, r < 5 Å) and Karplus dihedral restraints feed into structure calculation (CNS, CYANA), yielding atomic-resolution structures."},
    ];

    const CHECKPOINT_M3 = [QUIZ_ALL[0],QUIZ_ALL[1]];
    const CHECKPOINT_M5 = [QUIZ_ALL[2]];
    const CHECKPOINT_M6 = [QUIZ_ALL[3]];
    const CHECKPOINT_M7 = [QUIZ_ALL[7]];
    const CHECKPOINT_M8 = [QUIZ_ALL[4],QUIZ_ALL[9]];

    // ── HOOKS ─────────────────────────────────────────────────
    function useReveal(threshold=0.06) {
      const ref=useRef(null); const [vis,setVis]=useState(false);
      useEffect(()=>{
        const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true);},{threshold});
        if(ref.current)obs.observe(ref.current);
        return()=>obs.disconnect();
      },[]);
      return [ref,vis];
    }
    function useScrollPct() {
      const [p,setP]=useState(0);
      useEffect(()=>{
        const fn=()=>{const el=document.documentElement;setP(Math.min(1,el.scrollTop/Math.max(1,el.scrollHeight-el.clientHeight)));};
        window.addEventListener("scroll",fn,{passive:true});return()=>window.removeEventListener("scroll",fn);
      },[]);
      return p;
    }
    function useScrollY() {
      const [y,setY]=useState(0);
      useEffect(()=>{const fn=()=>setY(window.scrollY);window.addEventListener("scroll",fn,{passive:true});return()=>window.removeEventListener("scroll",fn);},[]);
      return y;
    }
    function useRAF(cb,active=true) {
      const r=useRef(cb); r.current=cb;
      useEffect(()=>{
        if(!active)return;
        let id,prev=performance.now();
        const loop=now=>{r.current(now-prev);prev=now;id=requestAnimationFrame(loop);};
        id=requestAnimationFrame(loop);
        return()=>cancelAnimationFrame(id);
      },[active]);
    }
    function useTick(ms=33) {
      const [t,setT]=useState(0);
      useEffect(()=>{const id=setInterval(()=>setT(p=>p+1),ms);return()=>clearInterval(id);},[ms]);
      return t;
    }
    function usePrefersReducedMotion() {
      const [reduced,setReduced]=useState(()=>window.matchMedia('(prefers-reduced-motion:reduce)').matches);
      useEffect(()=>{
        const mq=window.matchMedia('(prefers-reduced-motion:reduce)');
        const fn=()=>setReduced(mq.matches);
        mq.addEventListener('change',fn); return()=>mq.removeEventListener('change',fn);
      },[]);
      return reduced;
    }

    // ── REVEAL ────────────────────────────────────────────────
    function Reveal({children,delay=0}) {
      const [ref,vis]=useReveal(0.05);
      const rm=usePrefersReducedMotion();
      return (
        <div ref={ref} style={{
          opacity:vis?1:0,
          transform:(!rm&&!vis)?"translateY(48px)":"none",
          filter:(!rm&&!vis)?"blur(6px)":"none",
          transition:rm?"none":`opacity .9s ${EASE} ${delay}s, transform .9s ${EASE} ${delay}s, filter .7s ease ${delay}s`,
        }}>{children}</div>
      );
    }

    // ── BACKGROUND CANVAS ─────────────────────────────────────
    function NMRBackground() {
      const canvasRef=useRef(null);
      const rm=usePrefersReducedMotion();
      useEffect(()=>{
        if(rm) return; // skip animation for reduced-motion users
        const canvas=canvasRef.current; if(!canvas) return;
        const ctx=canvas.getContext('2d');
        const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;};
        resize(); window.addEventListener('resize',resize);
        const labels=['¹H','¹³C','¹⁹F','³¹P','¹⁵N','¹H'];
        const colors=[C.blue,C.teal,C.sky,C.peri,C.seafoam,C.gold];
        const particles=Array.from({length:24},(_,i)=>({
          x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
          vx:(Math.random()-.5)*.15, vy:-.1-Math.random()*.2,
          r:2.5+Math.random()*2.5, phase:Math.random()*Math.PI*2,
          speed:.008+Math.random()*.01, color:colors[i%colors.length],
          label:labels[i%labels.length], orbitAngle:Math.random()*Math.PI*2,
          orbitSpeed:(Math.random()-.5)*.025,
        }));
        let t=0, op=0, frameId;
        const draw=()=>{
          const W=canvas.width, H=canvas.height;
          const targetOp=Math.min(1,Math.max(0,(window.scrollY-H*.3)/(H*.5)));
          op+=(targetOp-op)*.04;
          canvas.width=canvas.width;
          if(op<.01){frameId=requestAnimationFrame(draw);return;}
          ctx.fillStyle='#06060e'; ctx.fillRect(0,0,W,H);
          ctx.globalAlpha=op; t+=.016;
          for(let i=0;i<9;i++){
            const yBase=H/(10)*(i+1), amp=12+5*Math.sin(t*.3+i);
            ctx.beginPath(); ctx.strokeStyle=`rgba(74,168,255,${.04+.02*Math.sin(t*.4+i)})`; ctx.lineWidth=1;
            for(let x=0;x<=W;x+=3){const y=yBase+amp*Math.sin((x/110)+t*.22+i*.85);if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
            ctx.stroke();
          }
          particles.forEach(p=>{
            p.orbitAngle+=p.orbitSpeed; p.phase+=p.speed;
            p.x+=p.vx+.2*Math.sin(p.phase*.7); p.y+=p.vy;
            if(p.y<-30){p.y=H+30;p.x=Math.random()*W;}
            if(p.x<-30)p.x=W+30; if(p.x>W+30)p.x=-30;
            const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);
            grd.addColorStop(0,p.color+'44'); grd.addColorStop(1,p.color+'00');
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r*5,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill();
          });
          ctx.globalAlpha=1; frameId=requestAnimationFrame(draw);
        };
        frameId=requestAnimationFrame(draw);
        return()=>{cancelAnimationFrame(frameId);window.removeEventListener('resize',resize);};
      },[rm]);
      if(rm) return null;
      return <canvas ref={canvasRef} style={{position:'fixed',inset:0,zIndex:0,pointerEvents:'none',width:'100%',height:'100%'}} aria-hidden="true"/>;
    }

    // ── SIDE NAV ──────────────────────────────────────────────
    function SideNav() {
      const [active,setActive]=useState(0);
      useEffect(()=>{
        const els=NAV_SECTIONS.map(s=>document.getElementById(s.id)).filter(Boolean);
        const obs=new IntersectionObserver(entries=>{
          entries.forEach(e=>{if(e.isIntersecting){const i=NAV_SECTIONS.findIndex(s=>s.id===e.target.id);if(i!==-1)setActive(i);}});
        },{threshold:.35});
        els.forEach(el=>obs.observe(el)); return()=>obs.disconnect();
      },[]);
      return (
        <nav className="side-nav" aria-label="Section navigation">
          {NAV_SECTIONS.map((s,i)=>(
            <button key={s.id} className={`side-nav-dot ${i===active?'active':''}`}
              onClick={()=>document.getElementById(s.id)?.scrollIntoView({behavior:'smooth'})}
              aria-label={`Navigate to ${s.label}`} aria-current={i===active?"true":undefined}>
              <span className="tooltip" aria-hidden="true">{s.label}</span>
            </button>
          ))}
        </nav>
      );
    }

    // ── CHECKPOINT QUIZ ───────────────────────────────────────
    function CheckpointQuiz({questions,moduleLabel}) {
      const [cur,setCur]=useState(0); const [sel,setSel]=useState(null);
      const [score,setScore]=useState(0); const [done,setDone]=useState(false);
      const q=questions[cur];
      const pick=i=>{if(sel!==null)return;setSel(i);if(i===q.ans)setScore(s=>s+1);};
      const next=()=>{if(cur<questions.length-1){setCur(c=>c+1);setSel(null);}else setDone(true);};
      const reset=()=>{setCur(0);setSel(null);setScore(0);setDone(false);};
      if(done) return (
        <div className="checkpoint-wrap" style={{textAlign:'center',padding:'32px 24px'}}>
          <div style={{color:score===questions.length?C.teal:C.text2,marginBottom:10,display:'flex',justifyContent:'center'}}>
            {score===questions.length?<Ic.Trophy/>:<Ic.Info/>}
          </div>
          <p className="serif" style={{fontSize:26,color:C.gold,fontWeight:600,marginBottom:6}}>{score}/{questions.length} correct</p>
          <p style={{fontSize:15,color:C.text2,marginBottom:20}}>{score===questions.length?"Perfect!":"Keep practising!"}</p>
          <button onClick={reset} aria-label="Try quiz again" style={{padding:'10px 28px',background:'transparent',border:`1.5px solid ${C.gold}`,color:C.gold,borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:15,minHeight:48}}>Try again</button>
        </div>
      );
      return (
        <div className="checkpoint-wrap">
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:C.goldSoft,border:`1.5px solid ${C.gold}50`,display:'flex',alignItems:'center',justifyContent:'center',color:C.gold}}>
              <Ic.Brain/>
            </div>
            <div>
              <p style={{fontWeight:700,fontSize:12,color:C.gold,textTransform:'uppercase',letterSpacing:'.1em',margin:0}}>Quick Check · {moduleLabel}</p>
              <p style={{fontSize:12,color:C.text3,margin:0}}>Question {cur+1} of {questions.length}</p>
            </div>
            <div style={{marginLeft:'auto',fontSize:14,fontWeight:700,color:C.gold}}>{score}/{cur} ✓</div>
          </div>
          <div style={{height:2,background:'rgba(201,169,110,.12)',borderRadius:1,marginBottom:16}}>
            <div style={{height:'100%',background:C.gold,borderRadius:1,width:`${(cur/questions.length)*100}%`,transition:'width .5s ease'}}/>
          </div>
          <div className="glass" style={{borderRadius:12,padding:'16px 18px',marginBottom:13}}>
            <p style={{fontWeight:600,fontSize:16,color:C.text,lineHeight:1.6,margin:0}}>{q.q}</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:12}} role="group" aria-label="Answer choices">
            {q.opts.map((opt,i)=>{
              let bg='rgba(255,255,255,.04)',border=C.border,color=C.text;
              if(sel!==null){if(i===q.ans){bg='rgba(0,191,168,.1)';border=C.teal;color=C.teal;}else if(i===sel){bg='rgba(255,124,110,.1)';border=C.coral;color=C.coral;}}
              return (
                <button key={i} onClick={()=>pick(i)}
                  aria-pressed={sel===i}
                  aria-label={`Option ${['A','B','C','D'][i]}: ${opt}`}
                  style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:'12px 16px',textAlign:'left',cursor:sel!==null?'default':'pointer',color,fontSize:15,fontWeight:i===q.ans&&sel!==null?700:400,transition:'all .2s',minHeight:48}}>
                  <span style={{color:C.text3,marginRight:10,fontWeight:600}}>{['A','B','C','D'][i]}.</span>{opt}
                  {sel!==null&&i===q.ans&&<span style={{marginLeft:8,display:'inline-flex',verticalAlign:'middle'}}><Ic.CheckCircle/></span>}
                  {sel===i&&sel!==q.ans&&<span style={{marginLeft:8,display:'inline-flex',verticalAlign:'middle'}}><Ic.XCircle/></span>}
                </button>
              );
            })}
          </div>
          {sel!==null&&(
            <div className="fade-up" style={{background:'rgba(255,255,255,.04)',borderRadius:12,padding:'13px 16px',marginBottom:12,border:`1px solid rgba(255,255,255,.08)`}}>
              <p style={{fontWeight:700,color:sel===q.ans?C.teal:C.coral,marginBottom:6,fontSize:15}}>{sel===q.ans?"Correct! ✓":"Incorrect — see the highlighted answer."}</p>
              <p style={{color:C.text2,fontSize:15,lineHeight:1.7,margin:0}}>{q.exp}</p>
            </div>
          )}
          {sel!==null&&(
            cur<questions.length-1
            ?<button onClick={next} aria-label="Next question" style={{width:'100%',background:C.gold,color:'#06060e',border:'none',borderRadius:10,padding:'14px',fontSize:15,cursor:'pointer',fontWeight:700,minHeight:48}}>Next question →</button>
            :<button onClick={next} aria-label="Complete quiz" style={{width:'100%',background:C.teal,color:'#06060e',border:'none',borderRadius:10,padding:'14px',fontSize:15,cursor:'pointer',fontWeight:700,minHeight:48}}>Complete ✓</button>
          )}
        </div>
      );
    }

    // ── FLOATING ATOMS HERO ───────────────────────────────────
    function FloatingAtoms() {
      const t=useTick(38); const rm=usePrefersReducedMotion();
      const atoms=[
        {bx:70,by:220,r:30,sp:.9,color:C.blue,label:"¹H"},
        {bx:260,by:130,r:24,sp:1.25,color:C.teal,label:"¹³C"},
        {bx:470,by:250,r:26,sp:.75,color:C.sky,label:"¹⁹F"},
        {bx:650,by:160,r:20,sp:1.45,color:C.peri,label:"³¹P"},
        {bx:160,by:340,r:19,sp:1.05,color:C.seafoam,label:"¹⁵N"},
        {bx:560,by:90,r:22,sp:.85,color:C.gold,label:"¹H"},
        {bx:380,by:380,r:17,sp:1.3,color:C.sky,label:"¹³C"},
        {bx:740,by:300,r:21,sp:.95,color:C.teal,label:"¹H"},
      ];
      return (
        <svg width="100%" height="100%" style={{position:"absolute",inset:0,opacity:.45}} viewBox="0 0 820 440" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs><filter id="glowA"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          {[1,2,3].map(i=>{
            const pts=Array.from({length:50},(_,j)=>{const x=j*17;const y=100+i*80+(rm?0:12*Math.sin(x/60+t*.025*i));return`${x},${y}`;}).join(' ');
            return <polyline key={i} points={pts} fill="none" stroke={C.blue} strokeWidth={.6} opacity={.12}/>;
          })}
          {atoms.map((a,i)=>{
            const wx=a.bx+(rm?0:14*Math.sin(t*.03*a.sp+i));
            const wy=a.by+(rm?0:9*Math.cos(t*.025*a.sp+i*1.4));
            const ang=(rm?45:t*a.sp*3.2+i*60)%360;
            const rad=ang*Math.PI/180, orbitRx=a.r*1.1, orbitRy=a.r*.4;
            const ox=wx+orbitRx*Math.cos(rad), oy=wy+orbitRy*Math.sin(rad);
            return (
              <g key={i} filter="url(#glowA)">
                <circle cx={wx} cy={wy} r={a.r+14} fill={a.color} opacity={.07}/>
                <circle cx={wx} cy={wy} r={a.r+6}  fill={a.color} opacity={.13}/>
                <circle cx={wx} cy={wy} r={a.r}    fill={a.color} opacity={.55}/>
                <text x={wx} y={wy+5} textAnchor="middle" fill="white" fontSize={12} fontWeight={700} fontFamily="Inter,sans-serif">{a.label}</text>
                <ellipse cx={wx} cy={wy} rx={orbitRx} ry={orbitRy} fill="none" stroke={a.color} strokeWidth={.8} opacity={.3}/>
                <line x1={wx} y1={wy} x2={ox} y2={oy} stroke={a.color} strokeWidth={1.5} opacity={.7}/>
                <circle cx={ox} cy={oy} r={4} fill={a.color} opacity={.9}/>
              </g>
            );
          })}
        </svg>
      );
    }

    // ── NUCLEUS ANIMATION ─────────────────────────────────────
    function Nucleus({spinUp=true,color=C.blue,label="¹H",speed=1,sc=1}) {
      const [ang,setAng]=useState(0); const rm=usePrefersReducedMotion();
      useRAF(dt=>setAng(a=>(a+speed*dt*.18)%360),!rm);
      const W=118*sc,H=188*sc,cx=W/2,rx=40*sc,ry=11*sc;
      const cY=spinUp?H*.73:H*.27;
      const rad=(rm?45:ang)*Math.PI/180,nx=cx+rx*Math.cos(rad),ny=cY+ry*Math.sin(rad);
      const front=Math.sin(rad*(Math.PI/180))>=0||rm,r=13*sc,uid=`n${label}${spinUp}${sc}`;
      return (
        <svg width={W} height={H} style={{overflow:"visible",maxWidth:"100%"}} aria-label={`${label} nucleus in ${spinUp?'alpha':'beta'} spin state`} role="img">
          <defs>
            <radialGradient id={uid} cx="35%" cy="35%" r="60%">
              <stop offset="0%" stopColor="white" stopOpacity=".55"/>
              <stop offset="100%" stopColor={color} stopOpacity="1"/>
            </radialGradient>
          </defs>
          <line x1={cx} y1={8} x2={cx} y2={H-8} stroke="rgba(255,255,255,0.2)" strokeWidth={1.5} strokeDasharray="5,4" aria-hidden="true"/>
          <polygon points={`${cx-5},12 ${cx+5},12 ${cx},3`} fill={C.blue} opacity={.8} aria-hidden="true"/>
          <text x={cx+10} y={16} fill={C.blue} fontSize={11*sc} fontStyle="italic" fontFamily="Cormorant Garamond,serif" aria-hidden="true">B₀</text>
          {!front&&<><line x1={cx} y1={cY} x2={nx} y2={ny} stroke={color} strokeWidth={2*sc} opacity={.18}/><circle cx={nx} cy={ny} r={r} fill={color} opacity={.18}/></>}
          <path d={`M ${cx-rx} ${cY} A ${rx} ${ry} 0 0 0 ${cx+rx} ${cY}`} fill="none" stroke={color} strokeWidth={2} opacity={.5}/>
          {front&&<>
            <line x1={cx} y1={cY} x2={nx} y2={ny} stroke={color} strokeWidth={3*sc}/>
            <circle cx={nx} cy={ny} r={r} fill={`url(#${uid})`} style={{filter:`drop-shadow(0 0 ${8*sc}px ${color}99)`}}/>
            <text x={nx} y={ny+5*sc} textAnchor="middle" fill="white" fontSize={10*sc} fontWeight="700" aria-hidden="true">{label}</text>
          </>}
          <circle cx={cx} cy={cY} r={4*sc} fill={color} opacity={.5}/>
          <text x={cx} y={H-2} textAnchor="middle" fill={color} fontSize={11*sc} fontWeight={600} aria-hidden="true">{spinUp?"α ↑ spin ½":"β ↓ spin −½"}</text>

    }

    // ── SPIN GRID ─────────────────────────────────────────────
    function SpinGrid({mode}) {
      const t=useTick(33); const rm=usePrefersReducedMotion();
      return (
        <svg width={190} height={140} style={{overflow:"visible",maxWidth:"100%"}} aria-label={`Spin diagram: ${mode} mode`} role="img">
          {Array.from({length:12}).map((_,i)=>{
            const col=i%4,row=Math.floor(i/4),cx=24+col*46,cy=22+row*44;
            const deg=mode==="random"?((rm?i*30:i*137.5+t*.5)%360):mode==="aligned"?(i%4!==0?0:180):90+(rm?20:28*Math.sin(t*.065+i*.9));
            const color=mode==="aligned"?(i%4!==0?C.blue:C.peri):mode==="tipped"?C.sky:"rgba(144,144,168,0.6)";
            const rad=(deg-90)*Math.PI/180,len=13;
            const ex=cx+len*Math.cos(rad),ey=cy+len*Math.sin(rad),sx=cx-len*Math.cos(rad),sy=cy-len*Math.sin(rad);
            return (
              <g key={i}>
                <circle cx={cx} cy={cy} r={13} fill="rgba(255,255,255,0.04)" stroke={color} strokeWidth={1.2} opacity={.7}/>
                <line x1={sx} y1={sy} x2={ex} y2={ey} stroke={color} strokeWidth={2.5}/>
                <polygon points={`${ex},${ey} ${ex-6*Math.cos(rad-.4)},${ey-6*Math.sin(rad-.4)} ${ex-6*Math.cos(rad+.4)},${ey-6*Math.sin(rad+.4)}`} fill={color}/>
              </g>
            );
          })}
        </svg>
      );
    }

    // ── ENERGY DIAGRAM ────────────────────────────────────────
    function EnergyDiag() {

    // ── FID / RF / FOURIER ────────────────────────────────────
    function FIDWave() {
      const [p,setP]=useState(0);
      useEffect(()=>{setP(0);const id=setInterval(()=>setP(v=>v>=100?0:v+1.4),22);return()=>clearInterval(id);},[]);
      const pts=Array.from({length:Math.floor(p/100*68)},(_,i)=>`${8+i*2.1},${54+29*Math.exp(-i/25)*Math.cos(i*.52)}`);
      return (
        <svg width={155} height={110} style={{maxWidth:"100%"}} aria-label="Free Induction Decay signal" role="img">
          <text x={77} y={14} textAnchor="middle" fill={C.text2} fontSize={11} fontWeight={600}>FID Signal</text>
          <line x1={8} y1={54} x2={148} y2={54} stroke={C.border} strokeWidth={1}/>
          {pts.length>1&&<path d={"M "+pts.join(" L ")} fill="none" stroke={C.seafoam} strokeWidth={2.5} style={{filter:`drop-shadow(0 0 5px ${C.seafoam}88)`}}/>}
          <text x={77} y={104} textAnchor="middle" fill={C.text2} fontSize={10}>time →</text>
        </svg>
      );
    }
    function RFWave() {
      const t=useTick(30); const rm=usePrefersReducedMotion();
      const pts=Array.from({length:55},(_,i)=>`${8+i*2.4},${50+27*Math.sin((i+(rm?0:t))*.45)}`).join(" ");
      return (
        <svg width={145} height={105} style={{maxWidth:"100%"}} aria-label="RF pulse at Larmor frequency" role="img">
          <text x={72} y={14} textAnchor="middle" fill={C.sky} fontSize={11} fontWeight={600}>RF Pulse at ν₀</text>
          <line x1={8} y1={50} x2={138} y2={50} stroke={C.border} strokeWidth={1}/>
          <polyline points={pts} fill="none" stroke={C.sky} strokeWidth={2.5} opacity={.9}/>
        </svg>
      );
    }
    function FourierViz() {
      const t=useTick(40); const rm=usePrefersReducedMotion();
      const fidPts=Array.from({length:46},(_,i)=>`${5+i*1.7},${28+15*Math.exp(-i/19)*Math.cos(i*.56+(rm?0:t*.04))}`).join(" ");
      const peaks=[{x:24,h:46,c:C.blue},{x:60,h:29,c:C.seafoam},{x:100,h:40,c:C.peri}];

        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"center"}} aria-label="Fourier Transform: time domain to frequency domain">

            <svg width={82} height={58} role="img" aria-hidden="true"><line x1={5} y1={28} x2={79} y2={28} stroke={C.border} strokeWidth={1}/><polyline points={fidPts} fill="none" stroke={C.seafoam} strokeWidth={1.5}/></svg>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{color:C.peri,fontSize:20}} aria-hidden="true">⟶</div>
            <div style={{color:C.text2,fontSize:11,fontWeight:600}}>Fourier<br/>transform</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,color:C.text2,marginBottom:4,fontWeight:600}}>Frequency domain</div>
            <svg width={122} height={58} role="img" aria-hidden="true">
              <line x1={5} y1={54} x2={118} y2={54} stroke={C.border} strokeWidth={1}/>
              {peaks.map(pk=>(<g key={pk.x}><line x1={pk.x} y1={54} x2={pk.x} y2={54-pk.h} stroke={pk.c} strokeWidth={4} style={{filter:`drop-shadow(0 0 5px ${pk.c})`}}/><ellipse cx={pk.x} cy={54-pk.h/2} rx={7} ry={pk.h/2} fill={pk.c} opacity={.13}/></g>))}

    // ── BOLTZMANN CALCULATOR ──────────────────────────────────
    function BoltzCalc() {
      const [B,setB]=useState(14.1);
      const gamma=26.752e7,hbar=1.054571817e-34,k=1.380649e-23,T=300;
      const excess=gamma*hbar*B/(k*T), excessPpm=Math.round(excess*1e6);
      const nuMHz=(gamma*B/(2*Math.PI)/1e6).toFixed(1);
      return (
        <div className="glass-2" style={{borderRadius:18,padding:"26px 22px"}}>
          <p className="serif" style={{fontWeight:700,fontSize:18,color:C.text,margin:"0 0 6px"}}>Boltzmann Distribution Calculator for ¹H</p>
          <p style={{fontSize:15,color:C.text2,margin:"0 0 18px"}}>Drag the slider to change B₀ and observe how sensitivity changes.</p>
          <label htmlFor="boltz-slider" style={{fontSize:14,color:C.text2,display:'block',marginBottom:6}}>
            Magnetic field strength: <strong style={{color:C.gold}}>{B.toFixed(1)} T</strong>
          </label>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
            <span style={{fontSize:13,color:C.text2,minWidth:26}}>1 T</span>
            <input id="boltz-slider" type="range" min={1} max={21} step={0.1} value={B}
              onChange={e=>setB(Number(e.target.value))} style={{flex:1,accentColor:C.gold}}
              aria-label="Magnetic field strength in Tesla"/>
            <span style={{fontSize:13,color:C.text2,minWidth:30}}>21 T</span>
          </div>
          <div style={{textAlign:"center",marginBottom:20}}>
            <span className="serif" style={{fontSize:42,fontWeight:700,color:C.gold}}>{B.toFixed(1)}</span>
            <span style={{fontSize:16,color:C.text2,marginLeft:6}}>Tesla</span>
          </div>
          <div className="grid-2" style={{gap:10,marginBottom:14}}>
            {[
              {label:"Larmor freq. (¹H)",value:`${nuMHz} MHz`,color:C.blue},
              {label:"Excess α-spins",value:`${excessPpm} per 10⁶`,color:C.teal},
              {label:"Nβ / Nα ratio",value:(1-excess).toFixed(6),color:C.sky},
              {label:"Relative signal",value:`${Math.round(B**1.75)}×`,color:C.peri},
            ].map(({label,value,color})=>(
              <div key={label} className="glass" style={{borderRadius:11,padding:"12px 14px"}}>
                <p style={{fontSize:12,color:C.text2,margin:"0 0 4px",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>{label}</p>
                <p className="serif" style={{fontSize:19,fontWeight:700,color,margin:0,fontStyle:"italic"}}>{value}</p>
              </div>
            ))}
          </div>
          <Callout color={C.blue}>
            <strong>Key insight:</strong> At {B.toFixed(1)} T, only {excessPpm} in every 1,000,000 ¹H spins contribute net signal. This fundamental sensitivity limitation explains the need for strong magnets, concentrated samples, and signal averaging.
          </Callout>
        </div>
      );
    }

    // ── KARPLUS CURVE ─────────────────────────────────────────
    function KarplusCurve() {
      const [theta,setTheta]=useState(60);
      const J=t=>Math.max(0,7*Math.cos(t*Math.PI/180)**2-1*Math.cos(t*Math.PI/180)+5);
      const L=36,R=256,T=12,B=145,W=280,H=175;
      const xOf=deg=>L+(deg/180)*(R-L), yOf=j=>B-(j/14)*(B-T);
      const pts=Array.from({length:181},(_,i)=>`${xOf(i).toFixed(1)},${yOf(J(i)).toFixed(1)}`).join(" ");
      const curX=xOf(theta),curY=yOf(J(theta));
      const labelLeft=curX>R-55, labelTop=curY<T+18;
      return (
        <div className="glass-2" style={{borderRadius:18,padding:"22px 20px"}}>
          <p className="serif" style={{fontWeight:700,fontSize:16,color:C.text,margin:"0 0 4px"}}>Karplus Equation</p>
          <p className="serif" style={{fontSize:14,color:C.text2,margin:"0 0 12px",fontStyle:"italic"}}>
            ³J<sub style={{fontSize:".75em",fontStyle:"normal"}}>HH</sub> = A cos²θ − B cosθ + C
          </p>
          <div style={{overflowX:"auto"}}>
            <svg width={W} height={H} style={{display:"block",margin:"0 auto",overflow:"visible"}} role="img" aria-label={`Karplus curve: at θ=${theta}°, J = ${J(theta).toFixed(1)} Hz`}>
              <defs><filter id="kGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
              <line x1={L} y1={T} x2={L} y2={B+6} stroke={C.border} strokeWidth={1}/>
              <line x1={L-4} y1={B} x2={R+4} y2={B} stroke={C.border} strokeWidth={1}/>
              <polyline points={pts} fill="none" stroke={C.blue} strokeWidth={2.5} strokeLinejoin="round"/>
              {[0,60,120,180].map(d=>(<g key={d}><line x1={xOf(d)} y1={B} x2={xOf(d)} y2={B+5} stroke={C.border}/><text x={xOf(d)} y={B+16} fill={C.text2} fontSize={10} textAnchor="middle">{d}°</text></g>))}
              {[0,4,8,12].map(j=>(<g key={j}><line x1={L-4} y1={yOf(j)} x2={L} y2={yOf(j)} stroke={C.border}/><text x={L-7} y={yOf(j)+4} fill={C.text2} fontSize={9} textAnchor="end">{j}</text></g>))}
              <text x={L-18} y={(T+B)/2+4} textAnchor="middle" fill={C.text2} fontSize={9} transform={`rotate(-90,${L-18},${(T+B)/2})`}>Hz</text>
              <line x1={curX} y1={Math.min(curY+7,B)} x2={curX} y2={B} stroke={C.seafoam} strokeWidth={1.5} strokeDasharray="4,3" opacity={.7}/>
              <circle cx={curX} cy={curY} r={7} fill={C.seafoam} filter="url(#kGlow)" opacity={.95}/>
              <text x={labelLeft?curX-12:curX+12} y={labelTop?curY+18:curY-10} fill={C.seafoam} fontSize={11} fontWeight={700} textAnchor={labelLeft?"end":"start"}>{J(theta).toFixed(1)} Hz</text>
            </svg>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginTop:8}}>
            <label htmlFor="karplus-slider" style={{fontSize:14,color:C.text2,minWidth:68}}>θ = {theta}°</label>
            <input id="karplus-slider" type="range" min={0} max={180} value={theta}
              onChange={e=>setTheta(Number(e.target.value))} style={{flex:1,accentColor:C.seafoam}}
              aria-label={`Dihedral angle theta, currently ${theta} degrees`}/>
          </div>
          <Callout color={C.sky} bg={C.skySoft}>
            <strong>Structural application:</strong> Alpha-helices (φ ≈ −60°, θ ≈ 60°) give small ³J (~4 Hz). Beta-sheets (φ ≈ −120°, θ ≈ 150°) give large ³J (~9 Hz). This allows NMR to detect protein secondary structure from coupling constants.
          </Callout>
        </div>
      );
    }

    // ── 2D NMR ────────────────────────────────────────────────
    function TwoDNMR() {
      const [mode,setMode]=useState("COSY");
      const L=48,R=282,T=10,B=220,PW=R-L,PH=B-T,W=300,H=260;
      const desc={COSY:"Proton-proton scalar coupling through 2–3 bonds",NOESY:"Proton-proton proximity in 3D space — NOE ∝ r⁻⁶, r < 5 Å",HSQC:"One-bond ¹H–¹³C correlation: one cross-peak per CH group"};
      const colors={COSY:C.blue,NOESY:C.sky,HSQC:C.seafoam};
      const peaks={COSY:[[1,3],[2,4],[3,1],[4,2],[2.5,1.5],[1.5,2.5]],NOESY:[[1,2.8],[2.8,1],[3,5],[5,3],[1.5,4],[4,1.5]],HSQC:[[1,18],[2,25],[3,55],[4,127],[5,165]]};
      const xH=h=>L+(h/6)*PW, yH=h=>B-(h/6)*PH, yC=c=>B-(c/200)*PH;
      const xTicks=[1,2,3,4,5], yTicksHH=[1,2,3,4,5], yTicksC=[20,60,100,140,180];
      return (
        <div>
          <div role="group" aria-label="2D NMR experiment selector" style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {["COSY","NOESY","HSQC"].map(m=>(
              <button key={m} onClick={()=>setMode(m)}
                aria-pressed={mode===m}
                style={{padding:"8px 18px",borderRadius:20,border:`1.5px solid ${mode===m?colors[m]:C.border}`,cursor:"pointer",fontSize:15,fontWeight:600,background:mode===m?colors[m]+"22":"transparent",color:mode===m?colors[m]:C.text2,transition:`all var(--dur-base)`,minHeight:48}}>{m}</button>
            ))}
          </div>
          <div className="glass" style={{borderRadius:14,padding:"16px"}}>
            <p style={{fontSize:15,color:C.text2,textAlign:"center",margin:"0 0 10px",fontWeight:600}}>{desc[mode]}</p>
            <div style={{overflowX:"auto"}}>
              <svg width={W} height={H} style={{display:"block",margin:"0 auto",overflow:"visible"}} role="img" aria-label={`${mode} 2D NMR plot`}>
                <defs>
                  <filter id="peakGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                  <clipPath id="plotClip"><rect x={L} y={T} width={PW} height={PH}/></clipPath>
                </defs>
                <rect x={L} y={T} width={PW} height={PH} fill="rgba(255,255,255,0.03)" stroke={C.border} strokeWidth={1} rx={3}/>
                {xTicks.map(v=>(<line key={v} x1={xH(v)} y1={T} x2={xH(v)} y2={B} stroke={C.border} strokeWidth={.4} opacity={.5}/>))}
                {(mode==="HSQC"?yTicksC:yTicksHH).map(v=>(<line key={v} x1={L} y1={mode==="HSQC"?yC(v):yH(v)} x2={R} y2={mode==="HSQC"?yC(v):yH(v)} stroke={C.border} strokeWidth={.4} opacity={.5}/>))}
                {mode!=="HSQC"&&(<line x1={xH(0)} y1={yH(0)} x2={xH(6)} y2={yH(6)} stroke={C.border} strokeWidth={.8} strokeDasharray="4,3" opacity={.6}/>)}
                <g clipPath="url(#plotClip)">
                  {peaks[mode].map(([fx,fy],i)=>(
                    <ellipse key={i} cx={xH(fx)} cy={mode==="HSQC"?yC(fy):yH(fy)} rx={11} ry={9} fill={colors[mode]} opacity={.88} filter="url(#peakGlow)"/>
                  ))}
                </g>
                {xTicks.map(v=>(<g key={v}><line x1={xH(v)} y1={B} x2={xH(v)} y2={B+5} stroke={C.border}/><text x={xH(v)} y={B+16} textAnchor="middle" fill={C.text2} fontSize={10}>{v}</text></g>))}
                {(mode==="HSQC"?yTicksC:yTicksHH).map(v=>(<g key={v}><line x1={L-5} y1={mode==="HSQC"?yC(v):yH(v)} x2={L} y2={mode==="HSQC"?yC(v):yH(v)} stroke={C.border}/><text x={L-8} y={(mode==="HSQC"?yC(v):yH(v))+4} textAnchor="end" fill={C.text2} fontSize={mode==="HSQC"?9:10}>{v}</text></g>))}
                <text x={(L+R)/2} y={H-4} textAnchor="middle" fill={C.text2} fontSize={11}>¹H δ (ppm)</text>
                <text x={14} y={(T+B)/2} textAnchor="middle" fill={C.text2} fontSize={10} transform={`rotate(-90,14,${(T+B)/2})`}>{mode==="HSQC"?"¹³C δ (ppm)":"¹H δ (ppm)"}</text>
              </svg>
            </div>
          </div>
          <div className="grid-3" style={{marginTop:14}}>
            {[{t:"COSY",d:"H-H bonds (2–3 bonds)",c:C.blue},{t:"NOESY",d:"H-H space (< 5 Å)",c:C.sky},{t:"HSQC",d:"H-C one bond",c:C.seafoam}].map(r=>(
              <div key={r.t} className="glass" style={{borderRadius:11,padding:"12px 14px",borderTop:`2px solid ${r.c}40`}}>
                <p style={{fontWeight:700,fontSize:14,color:r.c,margin:"0 0 4px"}}>{r.t}</p>
                <p style={{fontSize:14,color:C.text2,margin:0}}>{r.d}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── MAS ANIMATION ─────────────────────────────────────────

      return (
        <div className="glass-2" style={{borderRadius:18,padding:"22px",textAlign:"center"}}>
          <p className="serif" style={{fontWeight:700,fontSize:16,color:C.text,margin:"0 0 14px"}}>Magic Angle Spinning (MAS)</p>

            <g transform={`translate(90,105) rotate(${rot})`}>

            </g>
          </svg>
          <p style={{fontSize:15,color:C.text2,lineHeight:1.65,marginTop:4}}>Spinning at over 10,000 rpm around the magic angle (54.74°) averages dipolar couplings and CSA to zero.</p>

      );
    }

    // ── INTERACTIVE SPECTRUM ──────────────────────────────────
    const PEAKS=[
      {x:11.5,label:"COOH",color:C.coral,shift:"~11.5 ppm",desc:"Carboxylic acid proton. Strongly deshielded by the adjacent C=O group. High δ = downfield."},
      {x:7.3,label:"ArH",color:C.blue,shift:"~7.3 ppm",desc:"Aromatic proton. Deshielded by the ring current effect: delocalised π-electrons reinforce B₀ at ring proton positions."},
      {x:3.5,label:"OCH₃",color:C.sky,shift:"~3.5 ppm",desc:"Methoxy proton. Partially deshielded by the electronegative oxygen atom via inductive withdrawal."},
      {x:1.2,label:"CH₃",color:C.seafoam,shift:"~1.2 ppm",desc:"Methyl proton. Well shielded by surrounding electron density. Low δ = upfield region."},
      {x:0,label:"TMS",color:C.text3,shift:"0 ppm",desc:"Tetramethylsilane (TMS). Universal reference compound; δ is defined as 0 ppm by convention (IUPAC)."},
    ];
    function IntSpectrum() {
      const [hov,setHov]=useState(null);
      const W=490,max=14,xOf=p=>28+((max-p)/max)*(W-44);
      return (
        <div>
          <div style={{overflowX:"auto"}}>
            <svg width={W} height={190} style={{display:"block"}} role="img" aria-label="Interactive NMR spectrum showing peaks for COOH, ArH, OCH3, CH3 and TMS reference">
              <line x1={28} y1={152} x2={W-10} y2={152} stroke={C.border} strokeWidth={2}/>
              {[0,2,4,6,8,10,12].map(v=>(<g key={v}><line x1={xOf(v)} y1={150} x2={xOf(v)} y2={157} stroke={C.border}/><text x={xOf(v)} y={172} fill={C.text2} fontSize={11} textAnchor="middle">{v}</text></g>))}
              <text x={W/2} y={188} fill={C.text2} fontSize={12} textAnchor="middle">δ (ppm) — downfield left, upfield right</text>
              {PEAKS.map(pk=>{
                const cx=xOf(pk.x),isH=hov===pk.label;
                const h=pk.x===0?24:pk.x<2?50:pk.x<5?80:pk.x<8?106:126;
                return (
                  <g key={pk.label}
                    onMouseEnter={()=>setHov(pk.label)} onMouseLeave={()=>setHov(null)}
                    onFocus={()=>setHov(pk.label)} onBlur={()=>setHov(null)}
                    style={{cursor:"pointer"}} role="button" tabIndex={0}
                    aria-label={`${pk.label} peak at ${pk.shift}: ${pk.desc}`}
                    onKeyDown={e=>{if(e.key==='Enter'||e.key===' ')setHov(isH?null:pk.label);}}>
                    <ellipse cx={cx} cy={152-h/2} rx={isH?13:8} ry={h/2} fill={pk.color} opacity={isH?.82:.38} style={{transition:"all .2s"}}/>
                    <line x1={cx} y1={152-h} x2={cx} y2={152} stroke={pk.color} strokeWidth={isH?3:1.5} style={{filter:isH?`drop-shadow(0 0 8px ${pk.color})`:"none",transition:"all .2s"}}/>
                    <text x={cx} y={152-h-8} fill={pk.color} fontSize={11} textAnchor="middle" fontWeight={isH?700:400}>{pk.label}</text>
                  </g>
                );
              })}
            </svg>
          </div>
          <div style={{minHeight:92,marginTop:8}}>
            {hov?(
              <div className="fade-up glass-2" style={{borderRadius:12,padding:"14px 18px",border:`1px solid ${PEAKS.find(p=>p.label===hov)?.color}40`}} role="status">
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}>
                  <strong style={{color:PEAKS.find(p=>p.label===hov)?.color,fontSize:17}}>{hov}</strong>
                  <span style={{color:C.blue,fontSize:14,fontWeight:600}}>{PEAKS.find(p=>p.label===hov)?.shift}</span>
                </div>
                <p style={{color:C.text2,fontSize:15,margin:0,lineHeight:1.65}}>{PEAKS.find(p=>p.label===hov)?.desc}</p>
              </div>
            ):<p style={{color:C.text3,fontSize:15,textAlign:"center",paddingTop:26}}>Hover over a peak to see the assignment</p>}
          </div>
        </div>
      );
    }

    // ── J-SPLITTING ───────────────────────────────────────────
    function JSplitViz() {
      const [sel,setSel]=useState("doublet");
      const pats={
        singlet:{label:"Singlet (0 neighbours)",peaks:[{x:50,h:80}],ratio:"1",rule:"n+1 = 1 line"},
        doublet:{label:"Doublet (1 neighbour)",peaks:[{x:32,h:60},{x:68,h:60}],ratio:"1:1",rule:"n+1 = 2 lines"},
        triplet:{label:"Triplet (2 neighbours)",peaks:[{x:20,h:40},{x:50,h:80},{x:80,h:40}],ratio:"1:2:1",rule:"n+1 = 3 lines"},
        quartet:{label:"Quartet (3 neighbours)",peaks:[{x:14,h:30},{x:38,h:60},{x:62,h:60},{x:86,h:30}],ratio:"1:3:3:1",rule:"n+1 = 4 lines"},
      };
      const pat=pats[sel];
      return (
        <div>
          <div role="group" aria-label="Multiplicity pattern selector" style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
            {Object.entries(pats).map(([k,v])=>(
              <button key={k} onClick={()=>setSel(k)} aria-pressed={sel===k}
                style={{padding:"7px 13px",borderRadius:18,border:`1.5px solid ${sel===k?C.blue:C.border}`,cursor:"pointer",fontSize:13,fontWeight:600,background:sel===k?C.blue+"22":"transparent",color:sel===k?C.blue:C.text2,transition:`all var(--dur-base)`,minHeight:44}}>{v.label}</button>
            ))}
          </div>
          <div className="glass" style={{borderRadius:13,padding:"18px"}} role="img" aria-label={`${pat.label}: ${pat.ratio} ratio, ${pat.rule}`}>
            <svg width={270} height={100} style={{display:"block",margin:"0 auto"}}>
              <line x1={10} y1={92} x2={260} y2={92} stroke={C.border} strokeWidth={1.5}/>
              {pat.peaks.map((pk,i)=>(<g key={i}><ellipse cx={pk.x*2.5+8} cy={92-pk.h/2} rx={10} ry={pk.h/2} fill={C.blue} opacity={.65}/><line x1={pk.x*2.5+8} y1={92-pk.h} x2={pk.x*2.5+8} y2={92} stroke={C.blue} strokeWidth={2}/></g>))}
            </svg>
            <div style={{textAlign:"center",marginTop:8}}>
              <p className="serif" style={{fontWeight:700,fontSize:24,color:C.blue,margin:"0 0 4px",fontStyle:"italic"}}>{pat.ratio}</p>
              <p style={{fontSize:14,color:C.text2,margin:0}}>{pat.rule}</p>
            </div>
          </div>
        </div>
      );
    }

    // ── PROCESS SECTION ───────────────────────────────────────
    const STEPS=[
      {icon:()=><Ic.Shuffle/>,title:"Free spins: no external field",color:C.text2,short:"Random",
       body:"Without an external magnetic field, all nuclear spins are randomly oriented. There is no net magnetisation and therefore no measurable NMR signal.",
       visual:<SpinGrid mode="random"/>},
      {icon:()=><Ic.Magnet/>,title:"Applying B₀: spin alignment",color:C.blue,short:"Alignment",
       body:"A superconducting magnet applies B₀ (1–21 T). Spins align either parallel (α, m=+½, lower energy) or antiparallel (β, m=−½, higher energy). A small net magnetisation M₀ builds up according to the Boltzmann distribution.",
       visual:<div style={{display:"flex",gap:18,alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}><SpinGrid mode="aligned"/><EnergyDiag/></div>},
      {icon:()=><Ic.Radio/>,title:"RF pulse: excitation at the Larmor frequency",color:C.sky,short:"RF Pulse",
       body:"A short radiofrequency pulse at exactly the Larmor frequency ν₀ = γB₀/2π tips the net magnetisation by 90° into the transverse plane. The spins become phase-coherent and precess around B₀.",
       visual:<div style={{display:"flex",gap:18,alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}><SpinGrid mode="tipped"/><RFWave/></div>},
      {icon:()=><Ic.Activity/>,title:"FID signal: relaxation and detection",color:C.seafoam,short:"Detection",
       body:"After the pulse, spins return to equilibrium via T₁ (longitudinal) and T₂ (transverse) relaxation. The precessing magnetisation induces an exponentially decaying signal in the detection coil: the Free Induction Decay (FID).",
       visual:<div style={{display:"flex",gap:18,alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}><div style={{textAlign:"center"}}><Nucleus spinUp={true} color={C.seafoam} speed={2.5} sc={.88}/><p style={{color:C.text2,fontSize:14,marginTop:4}}>Precessing nucleus</p></div><FIDWave/></div>},
      {icon:()=><Ic.BarChart2/>,title:"Fourier transform: obtaining the spectrum",color:C.peri,short:"FT",
       body:"The Fourier transform converts the FID from the time domain into the frequency domain, yielding the NMR spectrum. Each peak appears at a characteristic chemical shift δ in ppm.",
       visual:<FourierViz/>},
    ];
    function ProcessSec() {
      const [act,setAct]=useState(0);
      const step=STEPS[act];
      return (
        <div>
          <div style={{display:"flex",alignItems:"flex-start",overflowX:"auto",paddingBottom:8,marginBottom:16}}>
            {STEPS.map((s,i)=>(
              <React.Fragment key={i}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,width:70}}>
                  <button onClick={()=>setAct(i)} aria-label={s.short} aria-current={i===act?"step":undefined}
                    style={{width:48,height:48,borderRadius:"50%",border:`2px solid ${i===act?s.color:C.border}`,background:i===act?s.color+"20":"transparent",cursor:"pointer",fontSize:17,boxShadow:i===act?`0 0 20px ${s.color}44`:"none",display:"flex",alignItems:"center",justifyContent:"center",transition:`all var(--dur-base) var(--ease-out)`,flexShrink:0,color:i===act?s.color:C.text2}}>
                    <s.icon/>
                  </button>
                  <p style={{fontSize:11,textAlign:"center",margin:"6px 0 0",lineHeight:1.3,fontWeight:i===act?700:400,color:i===act?s.color:C.text3,transition:`color var(--dur-base)`,width:"100%"}}>{s.short}</p>
                </div>
                {i<STEPS.length-1&&(<div style={{flexShrink:0,height:2,width:20,marginTop:23,background:i<act?C.blue+"66":C.border,transition:`background var(--dur-slow)`}}/>)}
              </React.Fragment>
            ))}
          </div>
          <div key={act} className="fade-up glass" style={{borderRadius:15,padding:"22px 16px",border:`1px solid ${step.color}30`,marginBottom:13,minHeight:155,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {step.visual}
          </div>
          <div className="glass-2" style={{borderRadius:12,padding:"17px 19px",marginBottom:13}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <span style={{color:step.color}}><step.icon/></span>
              <p style={{fontWeight:700,fontSize:17,color:step.color,margin:0}}>{step.title}</p>
            </div>
            <p style={{color:C.text2,lineHeight:1.75,fontSize:16,margin:0}}>{step.body}</p>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setAct(v=>Math.max(0,v-1))} disabled={act===0} aria-label="Previous step"
              style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${C.border}`,background:"transparent",color:act===0?C.text3:C.text2,cursor:act===0?"default":"pointer",fontSize:15,minHeight:48,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <Ic.ChevronLeft/> Previous
            </button>
            <button onClick={()=>setAct(v=>Math.min(STEPS.length-1,v+1))} disabled={act===STEPS.length-1} aria-label="Next step"
              style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:act===STEPS.length-1?"rgba(255,255,255,0.05)":step.color,color:act===STEPS.length-1?C.text3:"white",cursor:act===STEPS.length-1?"default":"pointer",fontWeight:600,fontSize:15,transition:`background var(--dur-base)`,minHeight:48,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              Next step <Ic.ChevronRight/>
            </button>
          </div>
        </div>
      );
    }

    // ── GAMMA TABLE ───────────────────────────────────────────
    function GTable() {
      const rows=[
        {n:"¹H",g:"26.752",f:"600.1",a:"99.985%",ok:true,hi:true},
        {n:"¹⁹F",g:"25.181",f:"564.7",a:"100.0%",ok:true,hi:false},
        {n:"³¹P",g:"10.841",f:"242.9",a:"100.0%",ok:true,hi:false},
        {n:"¹³C",g:"6.728",f:"150.9",a:"1.108%",ok:true,hi:false},
        {n:"¹⁵N",g:"−2.712",f:"60.8",a:"0.368%",ok:true,hi:false},
        {n:"¹²C",g:"n/a (I=0)",f:"—",a:"98.892%",ok:false,hi:false},
        {n:"¹⁶O",g:"n/a (I=0)",f:"—",a:"99.757%",ok:false,hi:false},
      ];
      return (
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",width:"100%",fontSize:15}} aria-label="Gyromagnetic ratios of NMR-relevant nuclei">

              {["Nucleus","γ (×10⁷ rad T⁻¹ s⁻¹)","Freq. at 14.1 T","Natural abund.","NMR-active"].map(h=><th key={h} scope="col" style={{padding:"10px 13px",textAlign:"left",color:C.text2,fontWeight:600,fontSize:13}}>{h}</th>)}
            </tr></thead>

              <tr key={r.n} style={{borderBottom:`1px solid ${C.border}`,background:r.hi?"rgba(74,168,255,0.08)":"transparent"}}>

                <td style={{padding:"11px 13px",color:r.ok?C.text:C.text3}}>{r.g}</td>
                <td style={{padding:"11px 13px",color:r.ok?C.text:C.text3}}>{r.f}{r.ok?" MHz":""}</td>
                <td style={{padding:"11px 13px",color:C.text2}}>{r.a}</td>
                <td style={{padding:"11px 13px"}}>{r.ok?<span style={{color:C.teal,fontWeight:700}}>Yes (I = ½)</span>:<span style={{color:C.text3}}>No (I = 0)</span>}</td>
              </tr>

        </div>
      );
    }

    // ── FINAL QUIZ ────────────────────────────────────────────
    function QuizSection() {
      const [cur,setCur]=useState(0); const [sel,setSel]=useState(null);
      const [answers,setAnswers]=useState([]); const [done,setDone]=useState(false);
      const q=QUIZ_FINAL[cur];
      const pick=i=>{if(sel!==null)return;setSel(i);setAnswers(a=>[...a,i===q.ans]);};
      const next=()=>{if(cur<QUIZ_FINAL.length-1){setCur(c=>c+1);setSel(null);}else setDone(true);};
      if(done){
        const correct=answers.filter(Boolean).length,pct=Math.round(correct/QUIZ_FINAL.length*100);
        return (
          <div style={{textAlign:"center",padding:"10px 0"}}>
            <div style={{color:pct>=85?C.teal:C.text2,marginBottom:14,display:'flex',justifyContent:'center',transform:'scale(1.5)'}}>{pct>=85?<Ic.Trophy/>:<Ic.Info/>}</div>
            <h3 className="serif" style={{fontSize:38,fontWeight:700,color:C.text,margin:"0 0 8px"}}>{pct>=85?"Excellent!":pct>=70?"Well done!":pct>=55?"Good effort!":"Keep practising!"}</h3>
            <div className="serif" style={{fontSize:54,fontWeight:700,color:C.gold,margin:"10px 0 8px"}}>{pct}%</div>
            <p style={{color:C.text2,marginBottom:24,fontSize:16}}>{correct} of {QUIZ_FINAL.length} correct</p>
            <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:28,flexWrap:"wrap"}} role="list" aria-label="Question results">
              {answers.map((ok,i)=>(
                <div key={i} role="listitem" aria-label={`Question ${i+1}: ${ok?"correct":"incorrect"}`} style={{width:44,height:44,borderRadius:"50%",background:ok?"rgba(0,191,168,.1)":"rgba(255,124,110,.1)",border:`2px solid ${ok?C.teal:C.coral}`,display:"flex",alignItems:"center",justifyContent:"center",color:ok?C.teal:C.coral}}>
                  {ok?<Ic.CheckCircle/>:<Ic.XCircle/>}
                </div>
              ))}
            </div>
            <button onClick={()=>{setCur(0);setSel(null);setAnswers([]);setDone(false);}}
              style={{background:C.gold,color:"#06060e",border:"none",borderRadius:12,padding:"14px 36px",fontSize:16,cursor:"pointer",fontWeight:700,minHeight:48}}>
              Try again
            </button>
          </div>
        );
      }
      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <span style={{color:C.text2,fontSize:15}}>Question {cur+1} of {QUIZ_FINAL.length}</span>
            <span style={{color:C.gold,fontSize:15,fontWeight:700}}>Score: {answers.filter(Boolean).length}</span>
          </div>
          <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,marginBottom:20}} role="progressbar" aria-valuenow={cur} aria-valuemax={QUIZ_FINAL.length} aria-label="Quiz progress">
            <div style={{height:"100%",background:`linear-gradient(90deg,${C.gold},${C.blue})`,borderRadius:2,width:`${(cur/QUIZ_FINAL.length)*100}%`,transition:"width .4s ease"}}/>
          </div>
          <div className="glass" style={{borderRadius:14,padding:"20px 18px",marginBottom:14}}>
            <h3 style={{fontSize:17,fontWeight:600,color:C.text,lineHeight:1.6,margin:0}}>{q.q}</h3>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}} role="group" aria-label="Answer options">
            {q.opts.map((opt,i)=>{
              let bg="rgba(255,255,255,0.04)",border=C.border,color=C.text;
              if(sel!==null){if(i===q.ans){bg="rgba(0,191,168,0.1)";border=C.teal;color=C.teal;}else if(i===sel){bg="rgba(255,124,110,0.1)";border=C.coral;color=C.coral;}}
              return (
                <button key={i} onClick={()=>pick(i)} aria-pressed={sel===i} aria-label={`Answer ${['A','B','C','D'][i]}: ${opt}`}
                  style={{background:bg,border:`1.5px solid ${border}`,borderRadius:11,padding:"13px 16px",textAlign:"left",cursor:sel!==null?"default":"pointer",color,fontSize:15,fontWeight:i===q.ans&&sel!==null?700:400,transition:"all .2s",minHeight:48}}>
                  <span style={{color:C.text3,marginRight:10}}>{["A","B","C","D"][i]}.</span>{opt}
                </button>
              );
            })}
          </div>
          {sel!==null&&(<div className="fade-up glass-2" style={{borderRadius:12,padding:"14px 18px",marginBottom:14}} role="status">
            <p style={{fontWeight:700,color:sel===q.ans?C.teal:C.coral,marginBottom:6,fontSize:16}}>{sel===q.ans?"Correct! ✓":"Incorrect. The correct answer is highlighted."}</p>
            <p style={{color:C.text2,fontSize:15,lineHeight:1.7,margin:0}}>{q.exp}</p>
          </div>)}
          {sel!==null&&(
            <button onClick={next} aria-label={cur<QUIZ_FINAL.length-1?"Next question":"View results"}
              style={{width:"100%",background:C.gold,color:"#06060e",border:"none",borderRadius:11,padding:"14px",fontSize:16,cursor:"pointer",fontWeight:700,minHeight:48}}>
              {cur<QUIZ_FINAL.length-1?"Next question →":"View results →"}
            </button>
          )}
        </div>
      );
    }

                {[{name:"Sem Andriessen",num:"S5842212"},{name:"Niels van der Heide",num:"S5989515"},{name:"Tim Krol",num:"S5973058"},{name:"Gosse Zandstra",num:"S5465508"}].map(s=>(
                  <div key={s.num} style={{textAlign:"center"}}>
                    <p style={{color:"#f0f0f8",fontSize:15,fontWeight:600,margin:"0 0 3px"}}>{s.name}</p>
